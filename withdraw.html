<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Withdraw - GrowVest</title>

<link rel="stylesheet" href="dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="dashboard">

<h2>Withdraw USDT (TRC20)</h2>

<div class="card">

<h3>Amount</h3>

<input
type="number"
id="withdrawAmount"
placeholder="Enter Amount">

<h3>Your TRC20 Wallet Address</h3>

<input
type="text"
id="walletAddress"
placeholder="Enter Your TRC20 Wallet">

<p style="margin-top:10px;color:#ef4444;">
Minimum Withdrawal: <b>10 USDT</b>
</p>
  <button id="submitWithdraw">Submit Withdrawal</button>

<p style="margin-top:15px;color:#64748b;font-size:14px;">
⚠️ Withdrawals are processed after admin verification.
Please make sure your TRC20 wallet address is correct.
</p>

</div>

<div class="card">

<h3>Withdrawal Status</h3>

<p id="withdrawStatus">No withdrawal request.</p>

</div>

<a href="dashboard.html" class="action" style="margin-top:20px;display:inline-flex;">
Back to Dashboard
</a>

</div>

<script type="module" src="withdraw.js"></script>

</body>
</html>
