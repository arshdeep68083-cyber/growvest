<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowVest Pro | Login</title>

<link rel="stylesheet" href="auth.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h1>Welcome Back</h1>

<p>Sign in to access your GrowVest Pro account.</p>

<form id="loginForm">

<div class="input-group">

<label for="email">Email or Username</label>

<input
type="text"
id="email"
name="email"
placeholder="Enter your email or username"
required>

</div>

<div class="input-group">

<label for="password">Password</label>

<input
type="password"
id="password"
name="password"
placeholder="Enter your password"
required>

</div>
<!-- =====================================================
     LOGIN.HTML - FINAL
     PART 2
===================================================== -->

<div class="form-options">

<label class="remember-me">

<input
type="checkbox"
id="rememberMe">

Remember Me

</label>

<a href="#" class="forgot-password">

Forgot Password?

</a>

</div>

<button
type="submit"
class="btn btn-primary">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

<div class="auth-footer">

<p>

Don't have an account?

<a href="register.html">

Create a New Account

</a>

</p>

</div>
<!-- =====================================================
     LOGIN.HTML - FINAL
     PART 3
===================================================== -->

<div class="auth-note">

<h3>

<i class="fa-solid fa-shield-halved"></i>

Secure Login

</h3>

<p>

Your account is protected with secure encryption.
Never share your password with anyone and always log
out after using a public or shared device.

</p>

</div>

</form>

</div>

</div>
<!-- =====================================================
     LOGIN.HTML - FINAL
     PART 4 (FINAL)
===================================================== -->

<script>

document.addEventListener("DOMContentLoaded", () => {

  const loginForm = document.getElementById("loginForm");

  loginForm.addEventListener("submit", (event) => {

    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      alert("Please enter your email/username and password.");
      return;
    }

    // Future backend/API login can be added here.

    alert("Login successful!");

    window.location.href = "dashboard.html";

  });

});

</script>

</body>
</html>
