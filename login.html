<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowVest Pro | Secure Login</title>

<link rel="stylesheet" href="auth.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="auth-container">

<div class="logo">
<i class="fa-solid fa-chart-line"></i>
</div>

<h1 class="auth-title">
Welcome Back
</h1>

<p class="auth-subtitle">
Sign in securely to access your GrowVest Pro dashboard and investment portfolio.
</p>

<form id="loginForm" class="auth-form">

<div class="form-group">

<label class="form-label">
Email Address
</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
class="input"
placeholder="Enter your email"
required>

</div>

</div>

<div class="form-group">

<label class="form-label">
Password
</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
class="input"
placeholder="Enter your password"
required>

</div>

</div>
<!-- =====================================================
     LOGIN.HTML - FINAL
     PART 2
===================================================== -->

<div class="auth-options">

<label class="remember">

<input
type="checkbox"
id="rememberMe">

<span>
Remember Me
</span>

</label>

<a
href="change-password.html"
class="forgot-password">

Forgot Password?

</a>

</div>

<button
type="submit"
class="btn btn-login">

<i class="fa-solid fa-shield-halved"></i>

Secure Login

</button>

<button
type="button"
class="btn btn-register"
onclick="window.location.href='register.html'">

<i class="fa-solid fa-user-plus"></i>

Create Account

</button>

<div class="auth-divider">

<span>OR</span>

</div>

<div class="auth-footer">

<p>
Protected by encrypted authentication.
</p>

<p style="margin-top:8px;">
Don't have an account?
<a href="register.html">
Create one now
</a>
</p>

</div>
<!-- =====================================================
     LOGIN.HTML - FINAL
     PART 3
===================================================== -->

</form>

</div>

<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<script>

// Show / Hide Password

const passwordInput =
document.getElementById("password");

const passwordBox =
passwordInput.parentElement;

const toggle =
document.createElement("i");

toggle.className =
"fa-solid fa-eye";

toggle.style.position = "absolute";
toggle.style.right = "18px";
toggle.style.top = "50%";
toggle.style.transform = "translateY(-50%)";
toggle.style.cursor = "pointer";
toggle.style.color = "#8ea3c7";

passwordBox.appendChild(toggle);

toggle.onclick = () => {

if(passwordInput.type === "password"){

passwordInput.type = "text";
toggle.className = "fa-solid fa-eye-slash";

}else{

passwordInput.type = "password";
toggle.className = "fa-solid fa-eye";

}

};

// Focus Email

window.onload = () => {

const email =
document.getElementById("email");

if(email){
email.focus();
}

};

</script>

</body>
</html>
<!-- =====================================================
     LOGIN.HTML - FINAL
     PART 4 (FINAL)
===================================================== -->

<script>

// Prevent multiple form submissions
const loginForm = document.getElementById("loginForm");

if (loginForm) {

  loginForm.addEventListener("submit", () => {

    const btn = document.querySelector(".btn-login");

    if (btn) {

      btn.disabled = true;

      btn.innerHTML =
      '<i class="fa-solid fa-spinner fa-spin"></i> Signing In...';

    }

  });

}

// Check internet status

window.addEventListener("offline", () => {

  alert("No internet connection.");

});

window.addEventListener("online", () => {

  console.log("Internet Connected");

});

</script>

</body>
</html>
