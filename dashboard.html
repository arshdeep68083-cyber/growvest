<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowVest Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

<header class="topbar">

<div>
<h2>GrowVest</h2>
<p>Welcome Back 👋</p>
</div>

<div class="notify">
<i class="fa-solid fa-bell"></i>
</div>

</header>

<section class="balance-card">

<h4>Total Balance</h4>

<h1 id="balance">0.00 USDT</h1>

<p id="userEmail">Loading...</p>

</section>

<div class="stats">

<div class="card">
<h3>Investment</h3>
<h2 id="investmentAmount">0.00 USDT</h2>
</div>

<div class="card">
<h3>Today's Profit</h3>
<h2 id="todayProfit" style="color:#16a34a;">+0.00 USDT</h2>
</div>

</div>

<div class="quick">

<a href="deposit.html" class="action">
<i class="fa-solid fa-wallet"></i>
<span>Deposit</span>
</a>

<a href="withdraw.html" class="action">
<i class="fa-solid fa-money-bill-transfer"></i>
<span>Withdraw</span>
</a>

<a href="plans.html" class="action">
<i class="fa-solid fa-chart-line"></i>
<span>Plans</span>
</a>

<a href="history.html" class="action">
<i class="fa-solid fa-clock-rotate-left"></i>
<span>History</span>
</a>

</div>

<section class="plan-box">

<h3>Active Investment</h3>

<div id="activePlan">
<p>No Active Plan</p>
</div>

</section>
  <section class="menu-section">

<h3>Quick Access</h3>

<div class="quick-grid">

<a href="trading.html" class="action">
<i class="fa-solid fa-arrow-trend-up"></i>
<span>Trading</span>
</a>

<a href="profile.html" class="action">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

<a href="admin.html" class="action">
<i class="fa-solid fa-user-shield"></i>
<span>Admin</span>
</a>

<a href="help.html" class="action">
<i class="fa-solid fa-headset"></i>
<span>Support</span>
</a>

</div>

</section>

<button id="logoutBtn" class="logout-btn">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</button>

</div>

<nav class="bottom-nav">

<a href="dashboard.html" class="active">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="plans.html">
<i class="fa-solid fa-chart-line"></i>
<span>Invest</span>
</a>

<a href="trading.html">
<i class="fa-solid fa-arrow-trend-up"></i>
<span>Trade</span>
</a>

<a href="history.html">
<i class="fa-solid fa-clock-rotate-left"></i>
<span>History</span>
</a>

<a href="profile.html">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

</nav>

<script type="module" src="dashboard.js"></script>

</body>
</html>
