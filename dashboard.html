<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowVest Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body class="dashboard-page">

<div class="dashboard">

<header class="topbar">

<div class="brand">
<i class="fa-solid fa-chart-line"></i>
<h2>GrowVest</h2>
</div>

<div class="profile-mini">
<i class="fa-solid fa-user-circle"></i>
</div>

</header>

<section class="balance-card">

<p>Total Portfolio</p>

<h1 id="balance">0.00 USDT</h1>

<span id="userEmail">Loading...</span>

</section>

<section class="quick-actions">

<a href="deposit.html" class="action-card">
<i class="fa-solid fa-wallet"></i>
<span>Deposit</span>
</a>

<a href="withdraw.html" class="action-card">
<i class="fa-solid fa-money-bill-transfer"></i>
<span>Withdraw</span>
</a>

<a href="plans.html" class="action-card">
<i class="fa-solid fa-coins"></i>
<span>Plans</span>
</a>

<a href="trading.html" class="action-card">
<i class="fa-solid fa-chart-line"></i>
<span>Trading</span>
</a>

</section>

<section class="plan-card">

<h3>Active Investment</h3>

<div id="activePlan">

<p>No Active Plan</p>

</div>

</section>
<section class="market-section">

<div class="section-title">
<h3>Market Overview</h3>
<a href="trading.html">View All</a>
</div>

<div class="market-grid">

<div class="market-card">
<h4>Bitcoin</h4>
<h2>$108,450</h2>
<p class="green">+2.45%</p>
</div>

<div class="market-card">
<h4>Ethereum</h4>
<h2>$2,690</h2>
<p class="green">+1.87%</p>
</div>

<div class="market-card">
<h4>BNB</h4>
<h2>$695</h2>
<p class="green">+3.21%</p>
</div>

</div>

</section>

<section class="services">

<a href="history.html" class="service-card">
<i class="fa-solid fa-clock-rotate-left"></i>
<span>History</span>
</a>

<a href="profile.html" class="service-card">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

<a href="help.html" class="service-card">
<i class="fa-solid fa-headset"></i>
<span>Support</span>
</a>

<a href="admin.html" class="service-card">
<i class="fa-solid fa-shield-halved"></i>
<span>Admin</span>
</a>

</section>

<nav class="bottom-nav">

<a href="dashboard.html" class="active">
<i class="fa-solid fa-house"></i>
<p>Home</p>
</a>

<a href="plans.html">
<i class="fa-solid fa-coins"></i>
<p>Invest</p>
</a>

<a href="trading.html">
<i class="fa-solid fa-chart-line"></i>
<p>Trade</p>
</a>

<a href="history.html">
<i class="fa-solid fa-clock"></i>
<p>History</p>
</a>

<a href="profile.html">
<i class="fa-solid fa-user"></i>
<p>Profile</p>
</a>

</nav>

<button id="logoutBtn" class="logout-btn">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</button>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
