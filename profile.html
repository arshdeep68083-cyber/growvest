<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowVest | My Profile</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container fade-up">

<div class="profile-header">

<div class="cover-gradient"></div>

<div class="profile-avatar">
<i class="fa-solid fa-user"></i>
</div>

<h2 id="userName">Loading...</h2>

<p id="userEmail">Loading...</p>

<div class="profile-badge">
<i class="fa-solid fa-circle-check"></i>
Verified Member
</div>

</div>

<div class="profile-stats">

<div class="stat-card">
<i class="fa-solid fa-wallet"></i>
<h3 id="balance">0.00 USDT</h3>
<p>Total Balance</p>
</div>

<div class="stat-card">
<i class="fa-solid fa-chart-line"></i>
<h3 id="activePlans">0</h3>
<p>Active Plans</p>
</div>

<div class="stat-card">
<i class="fa-solid fa-calendar-days"></i>
<h3 id="joinDate">--</h3>
<p>Join Date</p>
</div>

</div>

<div class="profile-menu">
  <a href="edit-profile.html" class="menu-link">

<div class="profile-item">
<span>
<i class="fa-solid fa-user-pen"></i>
Edit Profile
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>

<a href="change-password.html" class="menu-link">

<div class="profile-item">
<span>
<i class="fa-solid fa-lock"></i>
Change Password
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>

<a href="security.html" class="menu-link">

<div class="profile-item">
<span>
<i class="fa-solid fa-shield-halved"></i>
Security Center
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>

<a href="deposit.html" class="menu-link">

<div class="profile-item">
<span>
<i class="fa-solid fa-wallet"></i>
Deposit Funds
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>

<a href="withdraw.html" class="menu-link">

<div class="profile-item">
<span>
<i class="fa-solid fa-money-bill-transfer"></i>
Withdraw Funds
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>

<a href="history.html" class="menu-link">

<div class="profile-item">
<span>
<i class="fa-solid fa-clock-rotate-left"></i>
Transaction History
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>

<a href="help.html" class="menu-link">

<div class="profile-item">
<span>
<i class="fa-solid fa-headset"></i>
Support Center
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>

<a href="terms.html" class="menu-link">

<div class="profile-item">
<span>
<i class="fa-solid fa-file-contract"></i>
Terms & Privacy
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>

</div>

<button id="logoutBtn" class="logout-btn">
<i class="fa-solid fa-right-from-bracket"></i>
&nbsp; Logout
</button>

</div>
<nav class="bottom-nav">

<a href="dashboard.html" class="nav-item">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="plans.html" class="nav-item">
<i class="fa-solid fa-chart-line"></i>
<span>Plans</span>

<i class="fa-solid fa-wallet"></i>

<i class="fa-solid fa-clock-rotate-left"></i>
<span>History</span>
</a>

<a href="profile.html" class="nav-item active">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

</nav>

</html>
