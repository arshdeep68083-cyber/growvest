<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowVest | Profile</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container fade-up">

<div class="header">
<div class="header-left">
<h2>My Profile</h2>
<p>Manage your GrowVest account</p>
</div>
</div>

<div class="profile-card">

<div class="profile-avatar">
<i class="fa-solid fa-user"></i>
</div>

<h2 class="profile-name" id="name">
Loading...
</h2>

<p class="profile-email" id="email">
Loading...
</p>

<div style="margin-top:20px;text-align:center;">

<h3 style="margin-bottom:10px;">
Wallet Balance
</h3>

<p id="balance"
style="
font-size:28px;
font-weight:bold;
color:#22C55E;
">
0.00 USDT
</p>

<p style="margin-top:10px;color:#94A3B8;">
Joined:
<span id="joinDate">
N/A
</span>
</p>

</div>

</div>

<div class="profile-menu">

<a href="edit-profile.html" style="text-decoration:none;color:inherit;">
<div class="profile-item">
<span>
<i class="fa-solid fa-user-pen"></i>
Edit Profile
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>
</a>

<a href="change-password.html" style="text-decoration:none;color:inherit;">
<div class="profile-item">
<span>
<i class="fa-solid fa-key"></i>
Change Password
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>
</a>

<a href="security.html" style="text-decoration:none;color:inherit;">
<div class="profile-item">
<span>
<i class="fa-solid fa-shield-halved"></i>
Security
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>
</a>

<a href="help.html" style="text-decoration:none;color:inherit;">
<div class="profile-item">
<span>
<i class="fa-solid fa-headset"></i>
Support Center
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>
</a>
<a href="terms.html" style="text-decoration:none;color:inherit;">
<div class="profile-item">
<span>
<i class="fa-solid fa-file-contract"></i>
Terms & Privacy
</span>
<i class="fa-solid fa-chevron-right"></i>
</div>
</a>

</div>

<button id="logoutBtn" class="logout-btn">
<i class="fa-solid fa-right-from-bracket"></i>
&nbsp; Logout
</button>

</div>

<nav class="bottom-nav">

<a href="dashboard.html" class="nav-item">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="plans.html" class="nav-item">
<i class="fa-solid fa-chart-line"></i>
<span>Plans</span>
</a>

<a href="deposit.html" class="nav-item">
<i class="fa-solid fa-wallet"></i>
<span>Deposit</span>
</a>

<a href="history.html" class="nav-item">
<i class="fa-solid fa-clock-rotate-left"></i>
<span>History</span>
</a>

<a href="profile.html" class="nav-item active">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

</nav>

<script type="module" src="profile.js"></script>

</body>
</html>
