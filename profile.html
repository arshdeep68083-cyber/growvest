<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile - GrowVest</title>

<link rel="stylesheet" href="dashboard.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="dashboard">

<div class="profile-header-card">

<div class="profile-cover"></div>

<img id="profilePhoto"
src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff&size=200"
class="profile-photo">

<h2 id="userName">Loading...</h2>

<p id="userEmail">Loading...</p>

<div class="verified-badge">
<i class="fas fa-circle-check"></i>
Verified Member
</div>

</div>

<div class="profile-stats">

<div class="stat-box">
<i class="fas fa-wallet"></i>
<h3 id="userBalance">0.00 USDT</h3>
<p>Balance</p>
</div>

<div class="stat-box">
<i class="fas fa-chart-line"></i>
<h3 id="userInvestment">0.00 USDT</h3>
<p>Investment</p>
</div>

</div>

<div class="card">

<h3><i class="fas fa-user"></i> Account Details</h3>

<p><strong>User ID</strong></p>
<p id="userId">Loading...</p>

<hr style="margin:15px 0;">

<p><strong>Member Since</strong></p>
<p id="joinDate">Loading...</p>

<hr style="margin:15px 0;">
<p><strong>Account Status</strong></p>

<p style="color:#22c55e;font-weight:600;">
Active
</p>

</div>

<div class="card">

<button id="changePasswordBtn" class="btn-primary">
<i class="fas fa-key"></i>
Change Password
</button>

<button id="logoutBtn" class="btn-danger">
<i class="fas fa-right-from-bracket"></i>
Logout
</button>

</div>

<div style="margin-top:20px;">

<a href="dashboard.html" class="action">
<i class="fas fa-arrow-left"></i>
Back to Dashboard
</a>

</div>

</div>

<script type="module" src="profile.js"></script>

</body>
</html>
