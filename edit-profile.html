<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Profile | GrowVest</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container fade-up">

<div class="header">

<div class="header-left">
<h2>Edit Profile</h2>
<p>Update your personal information</p>
</div>

</div>

<div class="glass-card">

<div class="profile-avatar" style="text-align:center;margin-bottom:20px;">
<i class="fa-solid fa-user-circle"
style="font-size:70px;color:#16a34a;"></i>
</div>

<div class="input-group">
<i class="fa-solid fa-user"></i>
<input
type="text"
id="name"
placeholder="Full Name">
</div>

<br>

<div class="input-group">
<i class="fa-solid fa-envelope"></i>
<input
type="email"
id="email"
placeholder="Email Address"
readonly>
</div>

<br>

<div class="input-group">
<i class="fa-solid fa-phone"></i>
<input
type="tel"
id="phone"
placeholder="Phone Number">
</div>

<br>

<div class="input-group">
<i class="fa-solid fa-location-dot"></i>
<input
type="text"
id="country"
placeholder="Country">
</div>

<br>

<button
id="saveBtn"
class="login-btn">

<i class="fa-solid fa-floppy-disk"></i>
Save Profile

</button>

<br><br>

<a href="profile.html">

<button
type="button"
class="btn"
style="width:100%;">

⬅ Back to Profile

</button>

</a>

</div>
    </div>

<nav class="bottom-nav">

<a href="dashboard.html" class="nav-item">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="plans.html" class="nav-item">
<i class="fa-solid fa-chart-line"></i>
<span>Plans</span>
</a>

<a href="deposit.html" class="nav-item">
<i class="fa-solid fa-wallet"></i>
<span>Deposit</span>
</a>

<a href="history.html" class="nav-item">
<i class="fa-solid fa-clock-rotate-left"></i>
<span>History</span>
</a>

<a href="profile.html" class="nav-item active">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

</nav>

<script type="module">

import { auth, db } from "./firebase-config.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {

if (!user) {
window.location.href = "login.html";
return;
}

const userRef = doc(db, "users", user.uid);
const snap = await getDoc(userRef);

if (snap.exists()) {

const data = snap.data();

document.getElementById("name").value = data.name || "";
document.getElementById("email").value = data.email || user.email;
document.getElementById("phone").value = data.phone || "";
document.getElementById("country").value = data.country || "";

}

});

document.getElementById("saveBtn").addEventListener("click", async () => {

const user = auth.currentUser;

if (!user) return;

await updateDoc(doc(db, "users", user.uid), {

name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
country: document.getElementById("country").value

});

alert("Profile updated successfully!");

window.location.href = "profile.html";

});

</script>

</body>
</html>
