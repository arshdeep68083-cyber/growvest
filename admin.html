<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowVest Admin Panel</title>

<link rel="stylesheet" href="dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="dashboard">

<h2>GrowVest Admin Panel</h2>

<div class="card">
<h3>Pending Deposits</h3>
<div id="pendingDeposits">
<p>No pending deposits.</p>
</div>
</div>

<div class="card">
<h3>Approved Deposits</h3>
<div id="approvedDeposits">
<p>No approved deposits.</p>
</div>
</div>

<div class="card">
<h3>Pending Withdrawals</h3>
<div id="pendingWithdrawals">
<p>No pending withdrawals.</p>
</div>
</div>

<div class="card">
<h3>Approved Withdrawals</h3>
<div id="approvedWithdrawals">
<p>No approved withdrawals.</p>
</div>
</div>

<div style="margin-top:20px;">
<a href="dashboard.html" class="action">
← Back to Dashboard
</a>
</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
