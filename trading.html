<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Trading - GrowVest</title>

<link rel="stylesheet" href="dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://s3.tradingview.com/tv.js"></script>

</head>

<body>

<div class="dashboard">

<h2>📈 Live Crypto Trading</h2>

<div class="card">

<h3>BTC / USDT Live Chart</h3>

<div id="tradingview_chart" style="height:500px;"></div>

</div>

<div class="card">

<h3>🔥 Live Crypto Prices</h3>

<table style="width:100%;color:white;border-collapse:collapse;">

<thead>

<tr>
<th align="left">Coin</th>
<th align="right">Price</th>
</tr>

</thead>

<tbody id="coinPrices">

<tr><td>Loading...</td><td></td></tr>

</tbody>

</table>

</div>
  <div style="margin-top:20px;">

<a href="dashboard.html" class="action">
⬅ Back to Dashboard
</a>

</div>

</div>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 500,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "15",
  "timezone": "Etc/UTC",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "toolbar_bg": "#131722",
  "enable_publishing": false,
  "allow_symbol_change": true,
  "container_id": "tradingview_chart"
});

async function loadPrices() {

  try {

    const res = await fetch("https://api.binance.com/api/v3/ticker/price");

    const data = await res.json();

    const coins = [
      "BTCUSDT",
      "ETHUSDT",
      "BNBUSDT",
      "SOLUSDT",
      "XRPUSDT",
      "DOGEUSDT"
    ];

    let html = "";

    coins.forEach(symbol => {

      const coin = data.find(c => c.symbol === symbol);

      if (coin) {
        html += `
          <tr>
            <td>${symbol.replace("USDT","")}</td>
            <td style="text-align:right;">${Number(coin.price).toFixed(4)} USDT</td>
          </tr>
        `;
      }

    });

    document.getElementById("coinPrices").innerHTML = html;

  } catch (e) {

    document.getElementById("coinPrices").innerHTML =
      "<tr><td colspan='2'>Failed to load prices.</td></tr>";

  }

}

loadPrices();
setInterval(loadPrices, 5000);
</script>
  </body>
</html>
