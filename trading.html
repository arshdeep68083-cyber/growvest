<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading - GrowVest</title>

<link rel="stylesheet" href="dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="dashboard">

<h2>Trading</h2>

<div class="card">

<h3>Trade Amount</h3>

<input
type="number"
id="tradeAmount"
placeholder="Enter Amount (USDT)">

<h3>Select Trade</h3>

<select id="tradeType">
  <option value="buy">Buy</option>
  <option value="sell">Sell</option>
</select>

<button id="startTrade">Start Trade</button>

<p id="tradeStatus" style="margin-top:15px;">
No active trade.
</p>

</div>
<div class="card">

<h3>Trading Summary</h3>

<p><strong>Today's Profit:</strong> <span id="todayProfit">0.00 USDT</span></p>

<p><strong>Active Trades:</strong> <span id="activeTrades">0</span></p>

</div>

<div style="margin-top:20px;">

<a href="dashboard.html" class="action">
Back to Dashboard
</a>

</div>

</div>

<script type="module" src="trading.js"></script>

</body>
</html>
