<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit Funds | GrowVest</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="login-page">

<div class="bg-blur blur1"></div>
<div class="bg-blur blur2"></div>

<div class="login-wrapper">

<div class="login-card">

<div class="logo-box">

<div class="logo-icon">
<i class="fas fa-wallet"></i>
</div>

<h1>Deposit</h1>

<p>Add funds securely to your GrowVest account</p>

</div>

<div class="input-group">

<i class="fas fa-dollar-sign"></i>

<input
type="number"
id="amount"
placeholder="Enter Deposit Amount">

</div>

<h3 style="margin-top:20px;">
USDT (TRC20) Wallet
</h3>

<div style="
background:rgba(255,255,255,.08);
padding:15px;
border-radius:15px;
margin-top:10px;
word-break:break-all;
text-align:center;
">

<span id="wallet">
TRCaFDAORMmKvQPSDsJ1JdqhoQgioRhSXF
</span>

</div>

<br>

<button
class="login-btn"
id="copyBtn">

Copy Wallet Address

</button>

<br><br>

<h3>Upload Payment Screenshot</h3>

<input
type="file"
id="paymentProof"
accept="image/*"
style="
width:100%;
padding:12px;
background:rgba(255,255,255,.08);
border-radius:12px;
color:white;
">

<br><br>
  <button
class="login-btn"
id="depositBtn">

<i class="fas fa-paper-plane"></i>
Submit Deposit

</button>

<br><br>

<a href="dashboard.html">

<button
type="button"
class="login-btn"
style="background:linear-gradient(135deg,#64748b,#334155);">

<i class="fas fa-arrow-left"></i>
Back to Dashboard

</button>

</a>

</div>

</div>

</div>

<script>

document.getElementById("copyBtn").onclick = function () {

const wallet =
document.getElementById("wallet").innerText;

navigator.clipboard.writeText(wallet);

alert("Wallet Address Copied Successfully!");

};

</script>

<script type="module" src="deposit.js"></script>
