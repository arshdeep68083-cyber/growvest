<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit - GrowVest</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="logo-box">
<div class="logo-icon">
<i class="fa-solid fa-wallet"></i>
</div>

<h1>Deposit Funds</h1>
<p>Top up your GrowVest account</p>

</div>

<div class="card">

<h3>Deposit Amount</h3>

<input
type="number"
id="amount"
placeholder="Enter Amount (USDT)"
>

<br><br>

<h3>USDT (TRC20) Wallet</h3>

<div class="wallet-box">

<p id="wallet">
TRCaFDAORMmKvQPSDsJ1JdqhoQgioRhSXF
</p>

</div>

<br>

<button class="btn" id="copyBtn">
📋 Copy Wallet Address
</button>

<br><br>

<button class="btn" id="depositBtn">
💰 Submit Deposit
</button>

<br><br>

<a href="dashboard.html">
<button class="btn logoutBtn">
⬅ Back to Dashboard
</button>
</a>

</div>

</div>

<script>
document.getElementById("copyBtn").onclick=function(){
navigator.clipboard.writeText(document.getElementById("wallet").innerText);
alert("Wallet copied successfully");
};
</script>

<script type="module" src="deposit.js"></script>

</body>
</html>
