<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit - GrowVest</title>

<link rel="stylesheet" href="dashboard.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="dashboard">

<h2>Deposit USDT (TRC20)</h2>

<div class="card">
<h3>Wallet Address</h3>

<input
type="text"
id="walletAddress"
value="TRCaFDAoRMmKvQPSDsJ1JdqhoQgioRhSXF"
readonly>

<button id="copyBtn">Copy Address</button>
</div>

<div class="card">
<h3>Deposit Amount (USDT)</h3>

<input
type="number"
id="depositAmount"
placeholder="Enter Amount">

<h3>Transaction Hash (TXID)</h3>

<input
type="text"
id="txid"
placeholder="Paste TXID Here">
<button id="submitDeposit">Submit Deposit</button>

<p style="margin-top:15px;color:#64748b;font-size:14px;">
⚠️ Send only <b>USDT (TRC20)</b> to the wallet address above.
After payment, paste your Transaction Hash (TXID) and submit it for verification.
</p>

</div>

<div class="card">
<h3>Deposit Status</h3>
<p id="depositStatus">No pending deposit.</p>
</div>

<a href="dashboard.html" class="action" style="margin-top:20px;display:inline-flex;">
Back to Dashboard
</a>

</div>

<script type="module" src="deposit.js"></script>

</body>
</html>
