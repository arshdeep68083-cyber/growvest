<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowVest | Deposit Funds</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container fade-up">

<div class="header">

<div class="header-left">
<h2>Deposit Funds</h2>
<p>Add funds securely to your account</p>
</div>

</div>

<div class="glass-card">

<div class="input-group">
<i class="fa-solid fa-dollar-sign"></i>

<input
type="number"
id="amount"
placeholder="Enter Deposit Amount (USDT)">
</div>

<h3 style="margin-top:25px;">USDT (TRC20) Wallet Address</h3>

<div style="
margin-top:12px;
padding:16px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
word-break:break-all;
text-align:center;
">

<span id="wallet">
YOUR_TRC20_WALLET_ADDRESS
</span>

</div>

<button
id="copyBtn"
class="login-btn"
style="margin-top:15px;">

<i class="fa-solid fa-copy"></i>
&nbsp; Copy Wallet Address

</button>

<h3 style="margin-top:30px;">Upload Payment Screenshot</h3>

<input
type="file"
id="paymentProof"
accept="image/*"
style="
width:100%;
margin-top:12px;
padding:12px;
border-radius:12px;
background:rgba(255,255,255,.06);
color:white;
border:1px solid rgba(255,255,255,.08);
">

<br><br>

<button
id="depositBtn"
class="login-btn">

<i class="fa-solid fa-paper-plane"></i>
&nbsp; Submit Deposit

</button>

<br><br>

<a href="dashboard.html">
<button
type="button"
class="btn"
style="width:100%;background:#374151;color:#fff;">

<i class="fa-solid fa-arrow-left"></i>
&nbsp; Back to Dashboard

</button>
</a>

</div>
</div>

<nav class="bottom-nav">

<a href="dashboard.html" class="nav-item">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="plans.html" class="nav-item">
<i class="fa-solid fa-chart-line"></i>
<span>Plans</span>
</a>

<a href="deposit.html" class="nav-item active">
<i class="fa-solid fa-wallet"></i>
<span>Deposit</span>
</a>

<a href="history.html" class="nav-item">
<i class="fa-solid fa-clock-rotate-left"></i>
<span>History</span>
</a>

<a href="profile.html" class="nav-item">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

</nav>

<script>
document.getElementById("copyBtn").onclick = function () {
    const wallet = document.getElementById("wallet").innerText;
    navigator.clipboard.writeText(wallet);
    alert("Wallet address copied successfully!");
};
</script>

<script type="module" src="deposit.js"></script>

</body>
</html>
