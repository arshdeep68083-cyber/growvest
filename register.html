<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | GrowVest</title>

<link rel="stylesheet" href="auth.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="auth-page">

<div class="auth-card">

<div class="logo">

<i class="fa-solid fa-chart-line"></i>

<h1>GrowVest</h1>

<p>Create your secure investment account</p>

</div>

<form id="registerForm">

<div class="input-group">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="name"
placeholder="Full Name"
required>

</div>

<div class="input-group">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address"
required>

</div>

<div class="input-group">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

</div>
<div class="input-group">

    <i class="fa-solid fa-lock"></i>

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required>

</div>

<div class="terms">

    <label>

        <input type="checkbox" required>

        I agree to the
        <a href="terms.html">Terms & Conditions</a>

    </label>

</div>

<button
    type="submit"
    class="auth-btn">

    <i class="fa-solid fa-user-plus"></i>

    Create Account

</button>

</form>

<div class="bottom-text">

    Already have an account?

    <a href="login.html">
        Login
    </a>

</div>

<hr>

<div class="security-box">

    <i class="fa-solid fa-shield-halved"></i>

    <h3>Secure Registration</h3>

    <p>
        Your personal information is protected using
        advanced encryption and secure authentication.
    </p>

</div>
<div class="support-box">

    <h3>
        <i class="fa-solid fa-headset"></i>
        Need Help?
    </h3>

    <p>
        Contact our support team anytime.
    </p>

    <a href="mailto:growvestsupport78@gmail.com">
        growvestsupport78@gmail.com
    </a>

</div>

</div>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){

    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Passwords do not match.");
        return;
    }

    alert("Account created successfully!");

    window.location.href = "login.html";

});
</script>

</body>
</html>
