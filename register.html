<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowVest Pro | Register</title>

<link rel="stylesheet" href="auth.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h1>Create Account</h1>

<p>Create your GrowVest Pro account to start investing.</p>

<form id="registerForm">

<div class="input-group">

<label for="fullName">Full Name</label>

<input
type="text"
id="fullName"
name="fullName"
placeholder="Enter your full name"
required>

</div>

<div class="input-group">

<label for="email">Email Address</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter your email"
required>

</div>

<div class="input-group">

<label for="phone">Phone Number</label>

<input
type="tel"
id="phone"
name="phone"
placeholder="Enter your phone number"
required>

</div>

<div class="input-group">

<label for="username">Username</label>

<input
type="text"
id="username"
name="username"
placeholder="Choose a username"
required>

</div>
<!-- =====================================================
     REGISTER.HTML - FINAL
     PART 2
===================================================== -->

<div class="input-group">

<label for="password">Password</label>

<input
type="password"
id="password"
name="password"
placeholder="Create a strong password"
required>

</div>

<div class="input-group">

<label for="confirmPassword">Confirm Password</label>

<input
type="password"
id="confirmPassword"
name="confirmPassword"
placeholder="Confirm your password"
required>

</div>

<div class="input-group">

<label for="country">Country</label>

<input
type="text"
id="country"
name="country"
placeholder="Enter your country"
required>

</div>

<div class="input-group">

<label>

<input
type="checkbox"
id="terms"
required>

I agree to the Terms & Conditions

</label>

</div>

<button type="submit" class="btn btn-primary">

<i class="fa-solid fa-user-plus"></i>

Create Account

</button>
<!-- =====================================================
     REGISTER.HTML - FINAL
     PART 3
===================================================== -->

<div class="auth-footer">

<p>

Already have an account?

<a href="login.html">Login Here</a>

</p>

</div>

<div class="auth-note">

<h3>

<i class="fa-solid fa-shield-halved"></i>

Security Notice

</h3>

<p>

Your personal information is protected using secure encryption.
Please ensure all registration details are correct before creating
your account.

</p>

</div>

</form>

</div>

</div>
<!-- =====================================================
     REGISTER.HTML - FINAL
     PART 4 (FINAL)
===================================================== -->

<script>

document.addEventListener("DOMContentLoaded", () => {

  const registerForm = document.getElementById("registerForm");

  registerForm.addEventListener("submit", (event) => {

    event.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
      alert("Passwords do not match.");
      return;
    }

    if (password.length < 8) {
      alert("Password must be at least 8 characters.");
      return;
    }

    alert("Account created successfully!");

    // Future backend/API integration can be added here.
    // Example:
    // window.location.href = "login.html";

  });

});

</script>

</body>
</html>
